site_name: Antivírus Projeto
site_description: Educational malware detection engine demonstrating cybersecurity fundamentals
site_author: Nekas1980
site_url: https://nekas1980.github.io/anti-virus-projeto/
repo_url: https://github.com/Nekas1980/anti-virus-projeto
repo_name: Nekas1980/anti-virus-projeto
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

plugins:
  - search
  - mkdocstrings

markdown_extensions:
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist
  - admonition
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: guides/installation.md
    - Quick Start: guides/quickstart.md
    - How It Works: guides/how-it-works.md
  - Documentation:
    - Architecture: architecture/architecture.md
    - Development: architecture/development.md
    - Building & Distribution: architecture/build.md
  - Contributing:
    - Guidelines: contribute/guidelines.md
    - Project Structure: contribute/structure.md
    - Roadmap: contribute/roadmap.md
  - About:
    - License: about/license.md
    - Session Summary: about/session-summary.md
