site_name: Cyber-Sentinel 🛡️
site_description: Educational malware detection engine demonstrating cybersecurity fundamentals
site_author: Nelson M Madeira Rijo
site_url: https://nekas1980.github.io/anti-virus-projeto/
repo_url: https://github.com/Nekas1980/anti-virus-projeto
repo_name: Nekas1980/anti-virus-projeto
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Guias:
    - Instalação: guides/installation.md
    - Início Rápido: guides/quickstart.md
    - Funcionamento: guides/how-it-works.md
  - Documentação:
    - Arquitetura: architecture/architecture.md
    - Desenvolvimento: architecture/development.md
    - Build: architecture/build.md
  - Contribuir:
    - Diretrizes: contribute/guidelines.md
    - Estrutura: contribute/structure.md
    - Roadmap: contribute/roadmap.md
  - Sobre:
    - Licença: about/license.md
    - Resumo da Sessão: about/session-summary.md
