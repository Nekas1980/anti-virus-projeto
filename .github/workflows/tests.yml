name: Tests & Quality

on:
  push:
    branches: [ main, master, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master, develop ]

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Matriz cross-platform: 3 OS × 4 Python versions = 12 configurações
  # ──────────────────────────────────────────────────────────────────
  test:
    name: Tests · ${{ matrix.os }} · py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage[toml] openpyxl fastapi httpx

      - name: Run unit + integration tests via unittest discover
        run: |
          python -m unittest discover -s . -p "test_*.py" -v

      - name: Smoke check — engine importa
        run: |
          python -c "from Virus_project import scan_file, load_signatures; print('OK')"

  # ──────────────────────────────────────────────────────────────────
  # Cobertura com threshold de 80% (corre apenas em ubuntu/3.11)
  # ──────────────────────────────────────────────────────────────────
  coverage:
    name: Coverage (≥80%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage[toml] openpyxl fastapi httpx

      - name: Run coverage
        run: |
          coverage run -m unittest discover -s . -p "test_*.py"
          coverage report
          coverage xml
          coverage html

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────
  # Code quality: black, flake8 (não-bloqueante até estabilizar)
  # ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (black, flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install black flake8

      - name: Black format check (non-blocking)
        continue-on-error: true
        run: |
          black --check --diff .

      - name: Flake8
        continue-on-error: true
        run: |
          flake8 --count --statistics --show-source

  # ──────────────────────────────────────────────────────────────────
  # Security: bandit (static analysis) + safety (dependencies)
  # ──────────────────────────────────────────────────────────────────
  security:
    name: Security (bandit + safety)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install "bandit[toml]>=1.7" safety

      - name: Bandit static security analysis
        run: |
          bandit -r . -c pyproject.toml -f txt -o bandit-report.txt --severity-level medium || true
          cat bandit-report.txt

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.txt
          retention-days: 14

      - name: Safety dependency check
        continue-on-error: true
        run: |
          safety check --file=requirements.txt --output text || true

  # ──────────────────────────────────────────────────────────────────
  # Build artifacts: PyInstaller .exe (Windows only, on main or tags)
  # ──────────────────────────────────────────────────────────────────
  build-exe:
    name: Build standalone .exe (Windows)
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    needs: [test, coverage]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller openpyxl

      - name: Build .exe
        run: pyinstaller build_exe.spec

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: antivirus-windows-exe
          path: dist/
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────
  # GitHub Release — cria release e anexa .exe quando tag v* é pushed
  # ──────────────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-exe]
    steps:
      - uses: actions/checkout@v4

      - name: Download .exe artifact
        uses: actions/download-artifact@v4
        with:
          name: antivirus-windows-exe
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          cat > /tmp/release_notes.md << 'NOTES'
          Consulta o [CHANGELOG](https://github.com/Nekas1980/anti-virus-projeto/blob/main/CHANGELOG.md) para o detalhe completo das alterações.

          ### Instalação rápida (Windows)
          Descarrega `antivirus.exe` abaixo — não requer Python instalado.

          ### Instalação via código-fonte
          ```
          git clone https://github.com/Nekas1980/anti-virus-projeto.git
          cd anti-virus-projeto
          pip install -r requirements.txt
          python main.py
          ```

          📚 [Documentação](https://nekas1980.github.io/anti-virus-projeto/)
          NOTES
          gh release create "$TAG" dist/*.exe \
            --title "Anti-Vírus Projeto $TAG" \
            --notes-file /tmp/release_notes.md
