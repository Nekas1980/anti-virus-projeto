name: Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run unit tests
      run: |
        python -m unittest test_virus_project -v

    - name: Test signature loading
      run: |
        python -c "from Virus_project import load_signatures; sigs = load_signatures(__import__('pathlib').Path('signatures.json')); print(f'Loaded {len(sigs)} signatures')"

    - name: Test exclusion patterns
      run: |
        python -c "from Virus_project import load_exclusions; excl = load_exclusions(__import__('pathlib').Path('exclusions.json')); print(f'Loaded {len(excl)} exclusion patterns')"

    - name: Test report generator
      run: |
        python -c "from report_generator import HTMLReportGenerator; from Virus_project import ScanResult; results = [ScanResult('test.txt', 'clean', '', 'abc123')]; HTMLReportGenerator.generate(results); print('HTML report generated successfully')"

    - name: Lint check (optional)
      run: |
        python -m py_compile Virus_project.py gui.py scheduler.py virustotal_updater.py report_generator.py

  code-quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Check file sizes
      run: |
        echo "=== File Size Check ==="
        wc -l *.py

    - name: Check for syntax errors
      run: |
        python -m py_compile *.py || echo "Some files have syntax issues"

    - name: Verify JSON files
      run: |
        for f in *.json; do
          python -c "import json; json.load(open('$f'))" && echo "✓ $f is valid JSON" || echo "✗ $f has JSON errors"
        done
